services:
  # MongoDB database
  mongodb:
    image: mongo:latest
    container_name: gigshub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - gigshub-network

  # API Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gigshub-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO: mongodb://admin:password@mongodb:27017/gigshub?authSource=admin
      PORT: 5000
      JWT_SECRET: your-secret-key-change-this-in-production
    depends_on:
      - mongodb
    networks:
      - gigshub-network

  # React Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gigshub-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - gigshub-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: gigshub-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - gigshub-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: gigshub-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - gigshub-network

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: gigshub-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - gigshub-network

  # MongoDB Exporter for database metrics
  mongodb-exporter:
    image: bitnami/mongodb-exporter:latest
    container_name: gigshub-mongodb-exporter
    restart: unless-stopped
    ports:
      - "9216:9216"
    environment:
      MONGODB_URI: "mongodb://admin:password@mongodb:27017"
    depends_on:
      - mongodb
    networks:
      - gigshub-network

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  gigshub-network:
    driver: bridge
