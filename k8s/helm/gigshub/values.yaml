# Default values for GigsHub

# MongoDB Configuration
mongodb:
  enabled: true
  image:
    repository: mongo
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 27017
  auth:
    rootUsername: admin
    rootPassword: password
    database: gigshub
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# API Configuration
api:
  enabled: true
  replicaCount: 2
  image:
    repository: jainamsavla/gigshub-api
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 5000
  env:
    NODE_ENV: production
    PORT: 5000
    JWT_SECRET: your-secret-key-change-in-production
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Client Configuration
client:
  enabled: true
  replicaCount: 2
  image:
    repository: jainamsavla/gigshub-client
    tag: latest
    pullPolicy: Always
  service:
    type: LoadBalancer
    port: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Prometheus Configuration
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Grafana Configuration
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 3000
  auth:
    adminUser: admin
    adminPassword: admin123
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Ingress Configuration (Optional - for custom domain)
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: gigshub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
