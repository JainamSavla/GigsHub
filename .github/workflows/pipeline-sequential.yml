name: 🚀 Sequential CI/CD Pipeline

on:
  push:
    branches: [main, devops]
  pull_request:
    branches: [main, devops]

jobs:
  # Stage 1: Checkout and Setup
  checkout-scm:
    name: 📥 Checkout SCM
    runs-on: ubuntu-latest
    outputs:
      client-changed: ${{ steps.changes.outputs.client }}
      api-changed: ${{ steps.changes.outputs.api }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CLIENT_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^client/' && echo 'true' || echo 'false')
            API_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^api/' && echo 'true' || echo 'false')
          else
            CLIENT_CHANGED='true'
            API_CHANGED='true'
          fi
          echo "client=$CLIENT_CHANGED" >> $GITHUB_OUTPUT
          echo "api=$API_CHANGED" >> $GITHUB_OUTPUT

  # Stage 2: Tool Installation
  tool-install:
    name: 🔧 Tool Install
    runs-on: ubuntu-latest
    needs: [checkout-scm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

  # Stage 3: Check Changes
  check-changes:
    name: 🔍 Check Changes
    runs-on: ubuntu-latest
    needs: [tool-install]
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check if proceed
        id: check
        run: |
          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "✅ Changes detected, proceeding with pipeline"

  # Stage 4: Client - Install & Lint
  client-install:
    name: 📦 Client Install
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.checkout-scm.outputs.client-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Run linter
        working-directory: ./client
        run: npm run lint

      - name: Check formatting
        working-directory: ./client
        run: npm run format:check

  # Stage 5: SonarQube Scan - Client
  sonarqube-scan-client:
    name: 📊 SonarQube Scan - Client
    runs-on: ubuntu-latest
    needs: [client-install]
    if: needs.checkout-scm.outputs.client-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ./client
          args: >
            -Dsonar.organization=jainamsavla
            -Dsonar.projectKey=jainamsavla_gigshub_client
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # Stage 6: Build Docker Image - Client
  build-docker-client:
    name: 🐳 Build Docker Image - Client
    runs-on: ubuntu-latest
    needs: [sonarqube-scan-client]
    if: needs.checkout-scm.outputs.client-changed == 'true'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./client
        run: docker build -t gigshub-client:${{ github.sha }} .

      - name: Save Docker image
        run: docker save gigshub-client:${{ github.sha }} -o /tmp/client-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-image
          path: /tmp/client-image.tar
          retention-days: 1

  # Stage 7: Trivy Scan - Client
  trivy-scan-client:
    name: 🔒 Trivy Scan - Client
    runs-on: ubuntu-latest
    needs: [build-docker-client]
    if: needs.checkout-scm.outputs.client-changed == 'true'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: client-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/client-image.tar

      - name: Run Trivy scan (Table Output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gigshub-client:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Run Trivy scan (JSON Report)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: gigshub-client:${{ github.sha }}
          format: 'json'
          output: 'trivy-client-report.json'

      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: gigshub-client:${{ github.sha }}
          format: 'sarif'
          output: 'client-trivy-results.sarif'

      - name: Upload Trivy results to Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'client-trivy-results.sarif'
          category: 'client-trivy'

      - name: Upload Trivy Reports as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-client-reports
          path: trivy-client-report.json
          retention-days: 30

  # Stage 8: Push to DockerHub - Client
  push-dockerhub-client:
    name: ⬆️ Push to DockerHub - Client
    runs-on: ubuntu-latest
    needs: [trivy-scan-client]
    if: needs.checkout-scm.outputs.client-changed == 'true' && github.event_name == 'push'
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: client-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/client-image.tar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag and push
        run: |
          docker tag gigshub-client:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/gigshub-client:latest
          docker tag gigshub-client:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/gigshub-client:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gigshub-client:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gigshub-client:${{ github.sha }}

  # Stage 9: API - Install & Lint
  api-install:
    name: 📦 API Install
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.checkout-scm.outputs.api-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: ./api
        run: npm ci

  # Stage 10: SonarQube Scan - API
  sonarqube-scan-api:
    name: 📊 SonarQube Scan - API
    runs-on: ubuntu-latest
    needs: [api-install]
    if: needs.checkout-scm.outputs.api-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ./api
          args: >
            -Dsonar.organization=jainamsavla
            -Dsonar.projectKey=jainamsavla_gigshub_api
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # Stage 11: Build Docker Image - API
  build-docker-api:
    name: 🐳 Build Docker Image - API
    runs-on: ubuntu-latest
    needs: [sonarqube-scan-api]
    if: needs.checkout-scm.outputs.api-changed == 'true'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./api
        run: docker build -t gigshub-api:${{ github.sha }} .

      - name: Save Docker image
        run: docker save gigshub-api:${{ github.sha }} -o /tmp/api-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: /tmp/api-image.tar
          retention-days: 1

  # Stage 12: Trivy Scan - API
  trivy-scan-api:
    name: 🔒 Trivy Scan - API
    runs-on: ubuntu-latest
    needs: [build-docker-api]
    if: needs.checkout-scm.outputs.api-changed == 'true'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: api-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/api-image.tar

      - name: Run Trivy scan (Table Output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gigshub-api:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Run Trivy scan (JSON Report)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: gigshub-api:${{ github.sha }}
          format: 'json'
          output: 'trivy-api-report.json'

      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: gigshub-api:${{ github.sha }}
          format: 'sarif'
          output: 'api-trivy-results.sarif'

      - name: Upload Trivy results to Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'api-trivy-results.sarif'
          category: 'api-trivy'

      - name: Upload Trivy Reports as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-api-reports
          path: trivy-api-report.json
          retention-days: 30

  # Stage 13: Push to DockerHub - API
  push-dockerhub-api:
    name: ⬆️ Push to DockerHub - API
    runs-on: ubuntu-latest
    needs: [trivy-scan-api]
    if: needs.checkout-scm.outputs.api-changed == 'true' && github.event_name == 'push'
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: api-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/api-image.tar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag and push
        run: |
          docker tag gigshub-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/gigshub-api:latest
          docker tag gigshub-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/gigshub-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gigshub-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gigshub-api:${{ github.sha }}

  # Stage 14: Post Actions
  post-actions:
    name: 📋 Post Actions
    runs-on: ubuntu-latest
    needs: [push-dockerhub-client, push-dockerhub-api]
    if: always()
    steps:
      - name: Generate pipeline summary
        run: |
          echo "## 🚀 Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📥 Checkout SCM | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Tool Install | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Check Changes | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Client Install | ${{ needs.push-dockerhub-client.result == 'success' && '✅ Success' || needs.push-dockerhub-client.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 SonarQube Scan (Client) | ${{ needs.push-dockerhub-client.result == 'success' && '✅ Success' || needs.push-dockerhub-client.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Build Docker (Client) | ${{ needs.push-dockerhub-client.result == 'success' && '✅ Success' || needs.push-dockerhub-client.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Trivy Scan (Client) | ${{ needs.push-dockerhub-client.result == 'success' && '✅ Success' || needs.push-dockerhub-client.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⬆️ Push to DockerHub (Client) | ${{ needs.push-dockerhub-client.result == 'success' && '✅ Success' || needs.push-dockerhub-client.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 API Install | ${{ needs.push-dockerhub-api.result == 'success' && '✅ Success' || needs.push-dockerhub-api.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 SonarQube Scan (API) | ${{ needs.push-dockerhub-api.result == 'success' && '✅ Success' || needs.push-dockerhub-api.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Build Docker (API) | ${{ needs.push-dockerhub-api.result == 'success' && '✅ Success' || needs.push-dockerhub-api.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Trivy Scan (API) | ${{ needs.push-dockerhub-api.result == 'success' && '✅ Success' || needs.push-dockerhub-api.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⬆️ Push to DockerHub (API) | ${{ needs.push-dockerhub-api.result == 'success' && '✅ Success' || needs.push-dockerhub-api.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Summary" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 Docker images built and scanned" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 Security scans completed with Trivy" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Code quality analyzed with SonarCloud" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "- ⬆️ Images pushed to DockerHub" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            client-image
            api-image
