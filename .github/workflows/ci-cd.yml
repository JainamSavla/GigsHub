name: CI/CD Pipeline

on:
  push:
    branches: [devops]
  pull_request:
    branches: [devops]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date +%Y%m%d)
          TAG="${BUILD_DATE}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gigshub-api:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/gigshub-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gigshub-api:latest
          cache-to: type=inline

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gigshub-client:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/gigshub-client:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gigshub-client:latest
          cache-to: type=inline

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/gigshub-api:${{ steps.meta.outputs.tag }}
          format: 'sarif'
          output: 'trivy-api-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Scan Client image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/gigshub-client:${{ steps.meta.outputs.tag }}
          format: 'sarif'
          output: 'trivy-client-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Update GitOps branch
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Fetch and checkout gitops branch
          git fetch origin gitops:gitops
          git checkout gitops
          
          # Update both values.yaml and values-production.yaml
          sed -i "s|repository: gigshub-api|repository: ${DOCKER_USERNAME}/gigshub-api|g" values-production.yaml
          sed -i "s|repository: gigshub-client|repository: ${DOCKER_USERNAME}/gigshub-client|g" values-production.yaml
          sed -i "s|tag:.*# api|tag: ${IMAGE_TAG}  # api|g" values-production.yaml
          sed -i "s|tag:.*# client|tag: ${IMAGE_TAG}  # client|g" values-production.yaml
          sed -i "s|pullPolicy: IfNotPresent|pullPolicy: Always|g" values-production.yaml
          
          git add values-production.yaml
          git commit -m "Update image tags to ${IMAGE_TAG}" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gitops
