name: Deploy to Remote Server with Monitoring

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'client/**'
      - 'docker-compose.yml'
      - 'prometheus.yml'
      - 'grafana/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  deploy:
    name: Deploy to Remote Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOYMENT_SERVER }}
          username: ${{ secrets.DEPLOYMENT_USER }}
          key: ${{ secrets.DEPLOYMENT_KEY }}
          port: ${{ secrets.DEPLOYMENT_PORT || 22 }}
          script: |
            #!/bin/bash
            set -e
            
            echo "🚀 Starting deployment to remote server..."
            
            # Navigate to project directory
            cd ${{ secrets.DEPLOYMENT_PATH || '~/gigshub' }} || exit 1
            
            # Pull latest code
            echo "📥 Pulling latest code from repository..."
            git pull origin main
            
            # Pull latest Docker images
            echo "🐳 Pulling latest Docker images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/gigshub-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/gigshub-client:latest
            
            # Stop existing containers gracefully
            echo "🛑 Stopping existing containers..."
            docker-compose down || true
            
            # Wait a moment before starting new containers
            sleep 2
            
            # Start new containers with monitoring
            echo "✨ Starting services..."
            docker-compose up -d
            
            # Wait for services to start
            echo "⏳ Waiting for services to be ready..."
            sleep 15
            
            # Verify services are running
            echo "🔍 Verifying services..."
            docker-compose ps
            
            # Health checks
            echo "🏥 Running health checks..."
            
            # Check API health
            API_HEALTH=0
            for i in {1..10}; do
              if curl -f http://localhost:5000/health > /dev/null 2>&1; then
                echo "✅ API is healthy"
                API_HEALTH=1
                break
              fi
              if [ $i -lt 10 ]; then
                echo "Waiting for API... (attempt $i/10)"
              fi
              sleep 2
            done
            
            if [ $API_HEALTH -eq 0 ]; then
              echo "⚠️ API health check failed, but continuing..."
            fi
            
            # Check Prometheus health
            if curl -f http://localhost:9090/-/healthy > /dev/null 2>&1; then
              echo "✅ Prometheus is healthy"
            else
              echo "⚠️ Prometheus health check failed, but continuing..."
            fi
            
            # Check Grafana health
            if curl -f http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ Grafana is healthy"
            else
              echo "⚠️ Grafana health check failed, but continuing..."
            fi
            
            # Get server IP
            SERVER_IP=$(hostname -I | awk '{print $1}')
            
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo "════════════════════════════════════════════════════════════"
            echo ""
            echo "📋 SERVICE STATUS:"
            docker-compose ps
            echo ""
            echo "🔗 ACCESS YOUR SERVICES:"
            echo "   Frontend App:  http://$SERVER_IP:80"
            echo "   API Backend:   http://$SERVER_IP:5000"
            echo "   Prometheus:    http://$SERVER_IP:9090"
            echo "   Grafana:       http://$SERVER_IP:3000"
            echo ""
            echo "🔐 GRAFANA CREDENTIALS:"
            echo "   Username: admin"
            echo "   Password: admin123"
            echo ""
            echo "📊 MONITORING:"
            echo "   Grafana Dashboard URL:"
            echo "   http://$SERVER_IP:3000"
            echo "   Login and view 'GigsHub API Monitoring' dashboard"
            echo ""
            echo "📈 METRICS ENDPOINTS:"
            echo "   API Metrics:         http://$SERVER_IP:5000/metrics"
            echo "   System Metrics:      http://$SERVER_IP:9100/metrics"
            echo "   Database Metrics:    http://$SERVER_IP:9216/metrics"
            echo "════════════════════════════════════════════════════════════"

      - name: Deployment Success Summary
        if: success()
        run: |
          echo "## ✅ Deployment to Remote Server Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ secrets.DEPLOYMENT_SERVER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Deployed Services" >> $GITHUB_STEP_SUMMARY
          echo "- API Backend (port 5000)" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Client (port 80)" >> $GITHUB_STEP_SUMMARY
          echo "- MongoDB (port 27017)" >> $GITHUB_STEP_SUMMARY
          echo "- Prometheus (port 9090)" >> $GITHUB_STEP_SUMMARY
          echo "- Grafana (port 3000)" >> $GITHUB_STEP_SUMMARY
          echo "- Node Exporter (port 9100)" >> $GITHUB_STEP_SUMMARY
          echo "- MongoDB Exporter (port 9216)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Access Your Monitoring Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "**Grafana:** http://${{ secrets.DEPLOYMENT_SERVER }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "- **Username:** admin" >> $GITHUB_STEP_SUMMARY
          echo "- **Password:** admin123" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Service URLs" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | http://${{ secrets.DEPLOYMENT_SERVER }}:80 |" >> $GITHUB_STEP_SUMMARY
          echo "| API | http://${{ secrets.DEPLOYMENT_SERVER }}:5000 |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | http://${{ secrets.DEPLOYMENT_SERVER }}:9090 |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | http://${{ secrets.DEPLOYMENT_SERVER }}:3000 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Deployment Failure Alert
        if: failure()
        run: |
          echo "## ❌ Deployment to Remote Server Failed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Server:** ${{ secrets.DEPLOYMENT_SERVER }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs above for error details." >> $GITHUB_STEP_SUMMARY
