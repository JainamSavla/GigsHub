name: Frontend CI

on:
  push:
    paths:
      - 'client/**'
  pull_request:
    paths:
      - 'client/**'

jobs:
  lint-and-prettier:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Prettier
        run: npm run format -- --check

  vitest-tests:
    runs-on: ubuntu-latest
    needs: lint-and-prettier
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest
        run: npm run test

  codeql-analysis:
    runs-on: ubuntu-latest
    needs: vitest-tests
    permissions:
      security-events: write
      contents: read
      actions: read
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-frontend:
    runs-on: ubuntu-latest
    needs: vitest-tests
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build Frontend
        run: npm run build
