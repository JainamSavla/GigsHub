name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend CI/CD
  api-build-test:
    name: API - Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./api
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint --if-present
      
      - name: Run tests
        run: npm test --if-present
        env:
          MONGO: ${{ secrets.MONGO_TEST }}
          JWT_KEY: test-secret-key
          STRIPE: ${{ secrets.STRIPE_TEST }}
      
      - name: Build application
        run: npm run build --if-present

  # Frontend CI/CD
  client-build-test:
    name: Client - Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./client
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint --if-present
      
      - name: Run tests
        run: npm test --if-present
      
      - name: Build application
        run: npm run build
        env:
          VITE_API_URL: https://your-api.vercel.app/api
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
          retention-days: 7

  # Security Scanning
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run security audit - API
        working-directory: ./api
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run security audit - Client
        working-directory: ./client
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # Deploy notification
  deploy-notification:
    name: Deploy Status
    needs: [api-build-test, client-build-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deployment Success
        run: |
          echo "✅ All checks passed! Vercel will auto-deploy to production."
          echo "🚀 API: https://your-api.vercel.app"
          echo "🎨 Client: https://your-frontend.vercel.app"
