name: Deploy with Prometheus & Grafana

on:
  push:
    branches: [main, devops]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # Stage 1: Set up job
  setup-job:
    name: Set up job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Docker Installation
        run: |
          docker --version
          docker compose version

  # Stage 2: Prepare Deployment Environment
  prepare-deployment:
    name: Prepare Deployment Environment
    runs-on: ubuntu-latest
    needs: setup-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: |
          docker compose -f docker-compose.yml config

      - name: Verify Monitoring Configuration Files
        run: |
          echo "Checking Prometheus configuration..."
          cat prometheus.yml
          echo ""
          echo "Checking Grafana provisioning..."
          ls -la grafana/provisioning/

  # Stage 3: Deploy Stack (Docker Compose)
  deploy-stack:
    name: Deploy Stack (Docker Compose)
    runs-on: ubuntu-latest
    needs: prepare-deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull Latest Images
        run: |
          docker compose pull || true

      - name: Build and Deploy Services
        run: |
          echo "🚀 Starting deployment with monitoring..."
          docker compose up -d --build
          
      - name: Wait for Services to Start
        run: |
          echo "⏳ Waiting for services to initialize..."
          sleep 30

      - name: List Running Containers
        run: |
          echo "📦 Running Docker Services:"
          docker compose ps

  # Stage 4: Verify Services Health
  verify-services:
    name: Verify Services Health
    runs-on: ubuntu-latest
    needs: deploy-stack
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check MongoDB Health
        run: |
          echo "🔍 Checking MongoDB..."
          docker exec gigshub-mongo mongosh --eval "db.adminCommand('ping')" || echo "MongoDB not ready yet"

      - name: Check API Health
        run: |
          echo "🔍 Checking API Service..."
          curl -f http://localhost:5000/api/health || echo "API not ready yet"

      - name: Check Client Availability
        run: |
          echo "🔍 Checking Client Service..."
          curl -f http://localhost:80 || echo "Client not ready yet"

  # Stage 5: Verify Prometheus Targets
  verify-prometheus:
    name: Verify Prometheus Targets
    runs-on: ubuntu-latest
    needs: verify-services
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Prometheus Health
        run: |
          echo "🔍 Checking Prometheus..."
          curl -f http://localhost:9090/-/healthy || echo "Prometheus not ready"

      - name: Verify Prometheus Targets
        run: |
          echo "🎯 Checking Prometheus targets..."
          curl -s http://localhost:9090/api/v1/targets | jq '.data.activeTargets[] | {job: .labels.job, health: .health, lastError: .lastError}' || true

      - name: Check Prometheus Metrics
        run: |
          echo "📊 Checking if metrics are being collected..."
          curl -s http://localhost:9090/api/v1/query?query=up | jq '.data.result[] | {instance: .metric.instance, value: .value}' || true

  # Stage 6: Verify Grafana Access
  verify-grafana:
    name: Verify Grafana Access
    runs-on: ubuntu-latest
    needs: verify-prometheus
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Grafana Health
        run: |
          echo "🔍 Checking Grafana..."
          curl -f http://localhost:3000/api/health || echo "Grafana not ready"

      - name: Verify Grafana Datasources
        run: |
          echo "📊 Checking Grafana datasources..."
          curl -s -u admin:admin123 http://localhost:3000/api/datasources | jq '.' || echo "Could not fetch datasources"

      - name: List Grafana Dashboards
        run: |
          echo "📈 Checking Grafana dashboards..."
          curl -s -u admin:admin123 http://localhost:3000/api/search | jq '.' || echo "Could not fetch dashboards"

  # Stage 7: Generate Service Endpoints
  generate-endpoints:
    name: Generate Service Endpoints
    runs-on: ubuntu-latest
    needs: [verify-grafana]
    steps:
      - name: Display Service URLs
        run: |
          echo "## 🎉 Deployment Complete! Service Endpoints:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application Services" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 **Frontend**: http://localhost:80" >> $GITHUB_STEP_SUMMARY
          echo "- 🔧 **API**: http://localhost:5000" >> $GITHUB_STEP_SUMMARY
          echo "- 🗄️ **MongoDB**: mongodb://localhost:27017" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Monitoring Services" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Prometheus**: http://localhost:9090" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 **Grafana**: http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "  - Username: \`admin\`" >> $GITHUB_STEP_SUMMARY
          echo "  - Password: \`admin123\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Metrics Exporters" >> $GITHUB_STEP_SUMMARY
          echo "- 🖥️ **Node Exporter**: http://localhost:9100/metrics" >> $GITHUB_STEP_SUMMARY
          echo "- 🍃 **MongoDB Exporter**: http://localhost:9216/metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # Stage 8: Create Monitoring Test Report
  create-test-report:
    name: Create Monitoring Test Report
    runs-on: ubuntu-latest
    needs: [verify-prometheus, verify-grafana]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Monitoring Report
        run: |
          echo "## 📋 Monitoring System Health Report" >> monitoring-report.md
          echo "" >> monitoring-report.md
          echo "**Generated at**: $(date)" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          echo "### Prometheus Status" >> monitoring-report.md
          curl -s http://localhost:9090/api/v1/status/config | jq -r '.status' >> monitoring-report.md || echo "❌ Failed to fetch" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          echo "### Active Targets" >> monitoring-report.md
          curl -s http://localhost:9090/api/v1/targets | jq '.data.activeTargets | length' >> monitoring-report.md || echo "❌ Failed to fetch" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          echo "### Grafana Status" >> monitoring-report.md
          curl -s http://localhost:3000/api/health | jq '.' >> monitoring-report.md || echo "❌ Failed to fetch" >> monitoring-report.md
          
          cat monitoring-report.md

      - name: Upload Monitoring Report
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-report
          path: monitoring-report.md

  # Stage 9: Log Docker Services
  log-services:
    name: Log Docker Services
    runs-on: ubuntu-latest
    needs: deploy-stack
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Display Service Logs
        if: always()
        run: |
          echo "## 📝 Running Docker Services" >> $GITHUB_STEP_SUMMARY
          docker compose logs --tail=50 mongodb || true
          docker compose logs --tail=50 api || true
          docker compose logs --tail=50 prometheus || true
          docker compose logs --tail=50 grafana || true

  # Stage 10: Post Checkout Code
  post-checkout:
    name: Post Checkout Code
    runs-on: ubuntu-latest
    needs: [generate-endpoints, create-test-report]
    steps:
      - name: Cleanup
        run: |
          echo "✅ Deployment and monitoring setup complete!"
          echo "🔍 Check the monitoring report artifact for detailed health status"

  # Stage 11: Complete job
  complete-job:
    name: Complete job
    runs-on: ubuntu-latest
    needs: [post-checkout, log-services]
    if: always()
    steps:
      - name: Final Summary
        run: |
          echo "## 🎊 Pipeline Execution Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: All deployment and monitoring stages executed" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "1. Access Grafana at http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Prometheus metrics at http://localhost:9090" >> $GITHUB_STEP_SUMMARY
          echo "3. Review the monitoring report artifact for detailed status" >> $GITHUB_STEP_SUMMARY
